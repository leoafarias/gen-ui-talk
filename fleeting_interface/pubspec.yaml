name: fleeting_interface
description: An example presentation for SuperDeck
publish_to: none
version: 1.0.0+1
environment:
  sdk: ">=3.12.0 <4.0.0"
  flutter: ">=3.44.0"
dependencies:
  flutter:
    sdk: flutter
  firebase_app_check: ^0.4.1
  firebase_core: ^4.2.0
  firebase_ai: ^3.4.0
  flutter_genui:
    git:
      url: https://github.com/flutter/genui.git
