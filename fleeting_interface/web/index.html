<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="fleeting_interface">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>fleeting_interface</title>
  <link rel="manifest" href="manifest.json">
  <style>
    html,
    body {
      height: 100%;
    }

    body {
      margin: 0;
    }

    #flutter-loader {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at top, #17314d 0%, #09121b 45%, #05080d 100%);
      opacity: 1;
      transition: opacity 180ms ease-out, visibility 180ms ease-out;
      z-index: 9999;
    }

    #flutter-loader.is-hidden {
      opacity: 0;
      visibility: hidden;
    }

    #flutter-loader img {
      width: min(144px, 22vw);
      height: auto;
      display: block;
    }

    #flutter-loader-copy {
      margin: 18px 0 0;
      color: rgba(255, 255, 255, 0.82);
      font:
        500 15px/1.4 system-ui,
        -apple-system,
        BlinkMacSystemFont,
        "Segoe UI",
        sans-serif;
      letter-spacing: 0.02em;
      text-align: center;
    }

    #flutter-loader-copy.is-error {
      color: #ffe7e0;
      max-width: 24rem;
    }
  </style>
</head>
<body>
  <div id="flutter-loader" aria-hidden="true">
    <div>
      <img src="superdeck_loader.svg" alt="" width="144" height="163">
      <p id="flutter-loader-copy">Loading presentation…</p>
    </div>
  </div>
  <script>
    const isLocalFlutterHost = ['127.0.0.1', 'localhost', '[::1]'].includes(window.location.hostname);
    if (isLocalFlutterHost && self.FIREBASE_APPCHECK_DEBUG_TOKEN == null) {
      self.FIREBASE_APPCHECK_DEBUG_TOKEN = true;
    }

    const loader = document.getElementById('flutter-loader');
    const loaderCopy = document.getElementById('flutter-loader-copy');
    const loaderErrorTimeout = window.setTimeout(() => {
      if (!loader || !loaderCopy || loader.classList.contains('is-hidden')) {
        return;
      }

      loaderCopy.classList.add('is-error');
      loaderCopy.textContent = 'Startup is taking longer than expected. Refresh the page or check the browser console.';
    }, 15000);

    window.hideFlutterLoader = function () {
      if (!loader) return;

      window.clearTimeout(loaderErrorTimeout);
      loader.classList.add('is-hidden');
      window.setTimeout(() => loader.remove(), 220);
    };
  </script>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
